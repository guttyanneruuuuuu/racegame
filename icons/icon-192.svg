<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="192" height="192" rx="34" fill="url(#bg)"/>
  <!-- checkered flag stripe -->
  <g opacity="0.18">
    <rect x="0" y="12" width="20" height="20" fill="#fff"/>
    <rect x="40" y="12" width="20" height="20" fill="#fff"/>
    <rect x="80" y="12" width="20" height="20" fill="#fff"/>
    <rect x="20" y="32" width="20" height="20" fill="#fff"/>
    <rect x="60" y="32" width="20" height="20" fill="#fff"/>
    <rect x="100" y="32" width="20" height="20" fill="#fff"/>
  </g>
  <!-- car body -->
  <g transform="translate(96 110)">
    <ellipse cx="0" cy="20" rx="62" ry="10" fill="rgba(0,0,0,0.35)"/>
    <path d="M -56,-2 Q -50,-22 -22,-26 L 22,-26 Q 50,-22 56,-2 L 56,16 Q 56,22 50,22 L -50,22 Q -56,22 -56,16 Z"
          fill="url(#body)" stroke="#311B92" stroke-width="3"/>
    <!-- windshield -->
    <path d="M -32,-22 Q -22,-30 0,-30 Q 22,-30 32,-22 L 26,-4 L -26,-4 Z" fill="#1565C0" opacity="0.85"/>
    <!-- wheels -->
    <circle cx="-32" cy="18" r="10" fill="#212121"/>
    <circle cx="-32" cy="18" r="4" fill="#FAFAFA"/>
    <circle cx="32" cy="18" r="10" fill="#212121"/>
    <circle cx="32" cy="18" r="4" fill="#FAFAFA"/>
    <!-- headlights -->
    <circle cx="-48" cy="0" r="4" fill="#FFEB3B"/>
    <circle cx="48" cy="0" r="4" fill="#FFEB3B"/>
  </g>
  <!-- title -->
  <text x="96" y="172" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#fff" stroke="#311B92" stroke-width="1.5">GYRO RUSH</text>
</svg>
